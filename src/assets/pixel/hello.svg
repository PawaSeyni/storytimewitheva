<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 256 256"
     role="img"
     aria-labelledby="pixelHelloTitle pixelHelloDesc"
     focusable="false">
  <title id="pixelHelloTitle">Pixel the Butterfly waving hello</title>
  <desc id="pixelHelloDesc">A friendly purple and pink butterfly mascot with a cream face, orange jewel spots, and one arm raised in a wave.</desc>

  <defs>
    <linearGradient id="pixelHelloUpperWing" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#A78BFA"/>
      <stop offset="1" stop-color="#8B5CF6"/>
    </linearGradient>
    <linearGradient id="pixelHelloLowerWing" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F472B6"/>
      <stop offset="1" stop-color="#EC4899"/>
    </linearGradient>
    <linearGradient id="pixelHelloBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7C3AED"/>
      <stop offset="1" stop-color="#5B21B6"/>
    </linearGradient>
    <filter id="pixelHelloSoftShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="5" stdDeviation="4" flood-color="#3B0764" flood-opacity=".2"/>
    </filter>
  </defs>

  <g id="pixel-hello" filter="url(#pixelHelloSoftShadow)">
    <!-- movement sparkles -->
    <g id="sparkles" fill="#FBBF24">
      <path d="M29 57l3.2 6.8L39 67l-6.8 3.2L29 77l-3.2-6.8L19 67l6.8-3.2z"/>
      <path d="M50 34l2.1 4.4 4.4 2.1-4.4 2.1L50 47l-2.1-4.4-4.4-2.1 4.4-2.1z"/>
      <circle cx="18" cy="92" r="3.5"/>
    </g>

    <!-- antennae -->
    <g id="antennae" fill="none" stroke="#5B21B6" stroke-width="7" stroke-linecap="round">
      <path d="M113 63C108 42 98 30 88 22"/>
      <path d="M143 63c5-21 15-33 25-41"/>
    </g>
    <g fill="#FB923C" stroke="#C2410C" stroke-width="3">
      <circle cx="86" cy="20" r="8"/>
      <circle cx="170" cy="20" r="8"/>
    </g>

    <!-- wings -->
    <g id="wings" stroke="#6D28D9" stroke-width="6" stroke-linejoin="round">
      <path fill="url(#pixelHelloUpperWing)"
            d="M104 93C81 47 28 43 18 78c-9 34 30 60 83 51 14-2 22-18 16-30z"/>
      <path fill="url(#pixelHelloUpperWing)"
            d="M152 93c23-46 76-50 86-15 9 34-30 60-83 51-14-2-22-18-16-30z"/>
      <path fill="url(#pixelHelloLowerWing)"
            d="M102 131c-42-7-75 13-68 46 7 31 43 38 74 15 12-9 14-43-6-61z"/>
      <path fill="url(#pixelHelloLowerWing)"
            d="M154 131c42-7 75 13 68 46-7 31-43 38-74 15-12-9-14-43 6-61z"/>
    </g>

    <!-- wing highlights -->
    <g fill="#DDD6FE" opacity=".9">
      <path d="M87 76c-18-21-47-18-54 1-5 15 13 28 48 24 10-1 14-14 6-25z"/>
      <path d="M169 76c18-21 47-18 54 1 5 15-13 28-48 24-10-1-14-14-6-25z"/>
    </g>
    <g fill="#F9A8D4" opacity=".95">
      <path d="M88 149c-21-4-38 6-34 22 4 14 20 18 36 8 8-5 8-23-2-30z"/>
      <path d="M168 149c21-4 38 6 34 22-4 14-20 18-36 8-8-5-8-23 2-30z"/>
    </g>

    <!-- jewel spots -->
    <g id="jewels">
      <g fill="#FB923C" stroke="#C2410C" stroke-width="3">
        <circle cx="54" cy="77" r="10"/>
        <circle cx="202" cy="77" r="10"/>
      </g>
      <g fill="#FBBF24" stroke="#D97706" stroke-width="3">
        <circle cx="64" cy="164" r="8"/>
        <circle cx="192" cy="164" r="8"/>
      </g>
      <g fill="#FFF7ED">
        <circle cx="52" cy="73" r="3"/>
        <circle cx="200" cy="73" r="3"/>
        <circle cx="62" cy="161" r="2.5"/>
        <circle cx="190" cy="161" r="2.5"/>
      </g>
    </g>

    <!-- body -->
    <g id="body">
      <path fill="url(#pixelHelloBody)" stroke="#4C1D95" stroke-width="6"
            d="M107 119c0-15 9-25 21-25s21 10 21 25v79c0 24-10 39-21 39s-21-15-21-39z"/>
      <path d="M109 151h38M109 177h38M111 202h34"
            fill="none" stroke="#6D28D9" stroke-width="4" opacity=".9"/>
    </g>

    <!-- face -->
    <g id="face">
      <circle cx="128" cy="94" r="36" fill="#FFF7ED" stroke="#4C1D95" stroke-width="6"/>
      <circle cx="112" cy="91" r="10" fill="#312E81"/>
      <circle cx="144" cy="91" r="10" fill="#312E81"/>
      <circle cx="115" cy="87" r="3.5" fill="#FFFFFF"/>
      <circle cx="147" cy="87" r="3.5" fill="#FFFFFF"/>
      <circle cx="101" cy="105" r="7" fill="#FDA4AF" opacity=".9"/>
      <circle cx="155" cy="105" r="7" fill="#FDA4AF" opacity=".9"/>
      <path d="M116 108c7 11 17 11 24 0"
            fill="none" stroke="#9D174D" stroke-width="5" stroke-linecap="round"/>
    </g>

    <!-- arms -->
    <g id="arms" fill="#FFF7ED" stroke="#4C1D95" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">
      <!-- waving arm -->
      <path d="M108 132c-20-5-32-18-30-34 1-9 8-15 15-12 7 3 7 12 4 19 8-4 14 0 14 7 0 7-5 15-3 20z"/>
      <!-- relaxed arm -->
      <path d="M148 132c16 2 27 9 30 21 2 8-3 15-10 15-7 0-10-6-9-12-6 3-12 0-13-6-1-6 1-13 2-18z"/>
    </g>

    <!-- subtle flit trail -->
    <g id="movement-trail" fill="none" stroke="#FB923C" stroke-width="5" stroke-linecap="round">
      <path d="M72 105c-10 7-14 16-12 27"/>
      <path d="M62 94c-12 4-20 11-24 21"/>
    </g>
  </g>
</svg>
