<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 24 24"
     width="24"
     height="24"
     role="img"
     aria-labelledby="pixelReadingInlineTitle pixelReadingInlineDesc"
     focusable="false">
  <title id="pixelReadingInlineTitle">Pixel reading</title>
  <desc id="pixelReadingInlineDesc">A tiny butterfly mascot reading an open book.</desc>

  <!-- Simplified 24px production icon -->
  <g id="pixel-reading-inline-24" stroke-linecap="round" stroke-linejoin="round">
    <!-- wings -->
    <path d="M10.2 8.7C8.7 5.2 4.8 4.9 3.7 7.3c-.9 2.1 1.7 3.7 5.5 3.2"
          fill="#8B5CF6" stroke="#5B21B6" stroke-width="1.1"/>
    <path d="M13.8 8.7c1.5-3.5 5.4-3.8 6.5-1.4.9 2.1-1.7 3.7-5.5 3.2"
          fill="#8B5CF6" stroke="#5B21B6" stroke-width="1.1"/>
    <path d="M9.8 10.6c-2.8-.5-4.8.8-4.3 2.8.4 1.7 2.4 2.1 4.5.8"
          fill="#EC4899" stroke="#5B21B6" stroke-width="1.1"/>
    <path d="M14.2 10.6c2.8-.5 4.8.8 4.3 2.8-.4 1.7-2.4 2.1-4.5.8"
          fill="#EC4899" stroke="#5B21B6" stroke-width="1.1"/>

    <!-- jewels -->
    <circle cx="6.2" cy="7.7" r=".8" fill="#FB923C"/>
    <circle cx="17.8" cy="7.7" r=".8" fill="#FB923C"/>
    <circle cx="7.2" cy="12.4" r=".65" fill="#FBBF24"/>
    <circle cx="16.8" cy="12.4" r=".65" fill="#FBBF24"/>

    <!-- antennae -->
    <path d="M10.7 6.2c-.4-1.4-1-2.1-1.8-2.6M13.3 6.2c.4-1.4 1-2.1 1.8-2.6"
          fill="none" stroke="#5B21B6" stroke-width=".9"/>
    <circle cx="8.7" cy="3.5" r=".65" fill="#FB923C"/>
    <circle cx="15.3" cy="3.5" r=".65" fill="#FB923C"/>

    <!-- body and face -->
    <path d="M10.7 9.1c0-1 .5-1.7 1.3-1.7s1.3.7 1.3 1.7v6c0 1.4-.6 2.3-1.3 2.3s-1.3-.9-1.3-2.3z"
          fill="#7C3AED" stroke="#4C1D95" stroke-width="1"/>
    <circle cx="12" cy="7.6" r="2.45" fill="#FFF7ED" stroke="#4C1D95" stroke-width="1"/>

    <!-- attentive face -->
    <circle cx="11.1" cy="7.5" r=".42" fill="#312E81"/>
    <circle cx="12.9" cy="7.5" r=".42" fill="#312E81"/>
    <path d="M11.5 8.5c.35.25.65.25 1 0"
          fill="none" stroke="#9D174D" stroke-width=".55"/>

    <!-- open book -->
    <path d="M4.2 15.6c2.9-.8 5.3-.5 7.8.9v4.1c-2.5-1.2-4.9-1.5-7.8-.8z"
          fill="#FFF7ED" stroke="#4C1D95" stroke-width="1"/>
    <path d="M19.8 15.6c-2.9-.8-5.3-.5-7.8.9v4.1c2.5-1.2 4.9-1.5 7.8-.8z"
          fill="#FFF7ED" stroke="#4C1D95" stroke-width="1"/>
    <path d="M12 16.5v4.1"
          fill="none" stroke="#4C1D95" stroke-width=".8"/>

    <!-- tiny reading lines -->
    <path d="M5.7 17.2c1.4-.2 2.7-.1 4 .4M14.3 17.6c1.3-.5 2.6-.6 4-.4"
          fill="none" stroke="#C4B5FD" stroke-width=".65"/>

    <!-- hands -->
    <circle cx="9.8" cy="15.4" r=".72" fill="#FFF7ED" stroke="#4C1D95" stroke-width=".75"/>
    <circle cx="14.2" cy="15.4" r=".72" fill="#FFF7ED" stroke="#4C1D95" stroke-width=".75"/>
  </g>
</svg>
