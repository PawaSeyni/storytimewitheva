[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Force the legacy netlify.app subdomain to redirect to the custom domain.
# (Netlify's automatic "primary domain" redirect doesn't always engage; this
# explicit rule is version-controlled and reliable. Must come BEFORE the SPA
# fallback so it wins, and uses `force = true` to override any static match.)
[[redirects]]
  from = "https://storytimewitheva.netlify.app/*"
  to = "https://storytimewitheva.com/:splat"
  status = 301
  force = true

# SPA fallback: every unknown route returns index.html so React Router
# can resolve it client-side. Status 200 (not 301) keeps the URL intact.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# Long-cache for hashed static assets emitted by Vite
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.webp"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.svg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Lighthouse audit runs after every successful deploy.
# Reports go to the deploy summary in the Netlify dashboard.
# No thresholds set on this first pass — just collect scores. Once we know
# what's realistic for this site, tighten thresholds so regressions fail builds.
[[plugins]]
  package = "@netlify/plugin-lighthouse"

  [plugins.inputs]
    output_path = "reports/lighthouse.html"

  [[plugins.inputs.audits]]
    path = "/"

  [[plugins.inputs.audits]]
    path = "books"

  [[plugins.inputs.audits]]
    path = "activities"

  [[plugins.inputs.audits]]
    path = "activities/story-builder"

  [[plugins.inputs.audits]]
    path = "about"
