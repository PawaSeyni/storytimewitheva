[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Force the legacy netlify.app subdomain to redirect to the custom domain.
# (Netlify's automatic "primary domain" redirect doesn't always engage; this
# explicit rule is version-controlled and reliable. Uses `force = true` to
# override any static match.)
[[redirects]]
  from = "https://storytimewitheva.netlify.app/*"
  to = "https://storytimewitheva.com/:splat"
  status = 301
  force = true

# Plausible analytics proxy: serve the tracker script and event endpoint from this
# first-party domain (innocuous /js/paw.js + /api/paw paths) so ad-blockers that
# block the plausible.io host don't undercount traffic. status = 200 makes Netlify
# proxy (not redirect) to Plausible. index.html points the snippet at these paths.
[[redirects]]
  from = "/js/paw.js"
  to = "https://plausible.io/js/pa-gzJ4DP5LRQ39ZXessq04G.js"
  status = 200

[[redirects]]
  from = "/api/paw"
  to = "https://plausible.io/api/event"
  status = 200

# No SPA catch-all on purpose. Every real route (incl. /es,/fr variants, all book
# pages, and the noindex /profile,/search) is prerendered to its own static
# index.html by scripts/prerender.mjs, so unmatched URLs fall through to Netlify's
# auto-served dist/404.html (real HTTP 404) instead of the home page (soft-404).
# The prerender step is REQUIRED: if it fails, the build fails and the last good
# deploy stays live, so removing this fallback never leaves real routes unserved.

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# Long-cache for hashed static assets emitted by Vite
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.webp"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.svg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Lighthouse audit runs after every successful deploy.
# Reports go to the deploy summary in the Netlify dashboard.
# No thresholds set on this first pass — just collect scores. Once we know
# what's realistic for this site, tighten thresholds so regressions fail builds.
[[plugins]]
  package = "@netlify/plugin-lighthouse"

  [plugins.inputs]
    output_path = "reports/lighthouse.html"

  [[plugins.inputs.audits]]
    path = "/"

  [[plugins.inputs.audits]]
    path = "books"

  [[plugins.inputs.audits]]
    path = "activities"

  [[plugins.inputs.audits]]
    path = "activities/story-builder"

  [[plugins.inputs.audits]]
    path = "about"
